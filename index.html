<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Deployment Testing Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Deployment Testing Tracker</h1>
    
    <div id="profileSection" class="profile-section">
      <h2>Select or Create Profile</h2>
      
      <div class="form-group">
        <label for="profileDropdown">Existing Profiles:</label>
        <select id="profileDropdown">
          <option value="">-- Select a Profile --</option>
        </select>
      </div>

      <div class="form-group">
        <h3>Create New Profile</h3>
        <form id="createProfileForm">
          <div class="form-field">
            <label for="profileName">Profile Name:</label>
            <input type="text" id="profileName" placeholder="e.g., Tester 1" required>
          </div>
          <div class="form-field">
            <label for="profileEmail">Email:</label>
            <input type="email" id="profileEmail" placeholder="e.g., tester@exeloncorp.com" required>
          </div>
          <div class="form-field">
            <label for="profileRole">Role:</label>
            <input type="text" id="profileRole" placeholder="e.g., QA Tester" required>
          </div>
          <button type="submit" class="btn-primary">Create Profile</button>
        </form>
      </div>

      <div id="message" class="message"></div>
    </div>

    <div id="dashboard" class="dashboard" style="display:none;">
      <div class="dashboard-header">
        <h2>My Deployment Hours</h2>
        <p id="currentProfileName" class="profile-display"></p>
      </div>

      <div class="deployments-section">
        <h3>My Deployments</h3>
        <table id="deploymentsTable" class="deployments-table">
          <thead>
            <tr>
              <th>Week Start</th>
              <th>Week End</th>
              <th>Allocated Hours</th>
              <th>Used Hours</th>
              <th>Remaining Hours</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="deploymentsTableBody">
          </tbody>
        </table>
        <p id="noDeployments" class="no-data">No deployments yet. Create one below.</p>
      </div>

      <div class="create-deployment-section">
        <h3>Create New Deployment</h3>
        <form id="createDeploymentForm">
          <div class="form-field">
            <label for="deploymentWeekStart">Week Start Date:</label>
            <input type="date" id="deploymentWeekStart" required>
          </div>
          <div class="form-field">
            <label for="deploymentAllocatedHours">Allocated Hours:</label>
            <input type="number" id="deploymentAllocatedHours" min="1" max="160" placeholder="e.g., 40" required>
          </div>
          <button type="submit" class="btn-primary">Create Deployment</button>
        </form>
      </div>

      <div id="dashboardMessage" class="message"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
